server:
  port: ${PORT:8080}

mq:
  broker-id: ${BROKER_ID:1}
  data-dir: ${DATA_DIR:./data}
  default-partition-count: ${DEFAULT_PARTITIONS:3}
  replication-factor: ${REPLICATION_FACTOR:1}
  peers: ${PEERS:}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus,info
  metrics:
    tags:
      application: distributed-mq
